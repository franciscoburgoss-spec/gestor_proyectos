{% extends "base.html" %}
{% block title %}Editar {{ sol.tipo }} — {{ proyecto.acronimo }}{% endblock %}
{% block content %}

<header class="project-header">
    <h1>Editar {{ sol.tipo }} #{{ sol.numero_iteracion }}</h1>
    <div class="meta">
        <span>Proyecto: <a href="{{ url_for('ver_proyecto', proyecto_id=proyecto.id) }}">{{ proyecto.acronimo }}</a></span>
    </div>
</header>

<section class="card">
    <form method="post" action="{{ url_for('editar_solicitud', sol_id=sol.id) }}" class="form-stacked">
        <div class="row">
            <div class="form-group" style="flex:1;">
                <label>Fecha límite (opcional)</label>
                <input type="date" name="fecha_limite" value="{{ sol.fecha_limite or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Notas</label>
            <textarea name="notas" rows="4">{{ sol.notas or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn">Guardar cambios</button>
            <a href="{{ url_for('ver_solicitud', sol_id=sol.id) }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</section>

{% endblock %}
