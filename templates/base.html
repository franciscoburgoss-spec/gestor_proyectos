<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Proyectos de Ingeniería{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}" class="logo">📐 Ingeniería</a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Proyectos</a>
            <a href="{{ url_for('tareas') }}">Tareas</a>
            <a href="{{ url_for('jornada') }}">Jornada</a>
            <a href="{{ url_for('reporte_semanal') }}">Reporte</a>
            <a href="{{ url_for('config') }}">Configuración</a>
            <a href="{{ url_for('cementerio') }}">Cementerio</a>
            <a href="{{ url_for('backup') }}" style="color:var(--success);">💾 Backup</a>
            <form action="{{ url_for('buscar') }}" method="get" style="display:inline-flex; margin-left:12px;">
                <input type="text" name="q" placeholder="Buscar..." style="padding:4px 8px; font-size:12px; width:120px;" required minlength="2">
            </form>
        </div>
    </nav>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
